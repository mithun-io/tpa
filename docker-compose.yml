version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tpa-postgres
    restart: always
    environment:
      POSTGRES_USER: tpauser
      POSTGRES_PASSWORD: tpapassword
      POSTGRES_DB: tpadb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tpauser -d tpadb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tpa-network

  redis:
    image: redis:7-alpine
    container_name: tpa-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tpa-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: tpa-zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - tpa-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: tpa-kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: nc -z localhost 9092 || exit -1
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tpa-network

  backend-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tpa-backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/tpadb
      - SPRING_DATASOURCE_USERNAME=tpauser
      - SPRING_DATASOURCE_PASSWORD=tpapassword
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_AI_OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - tpa-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tpa-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend-api
    networks:
      - tpa-network

networks:
  tpa-network:
    driver: bridge
